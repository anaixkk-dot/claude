<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Неоновый калькулятор</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0a1f;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255, 0, 200, 0.15), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.15), transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(150, 0, 255, 0.1), transparent 70%);
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background-image:
      linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  .stars {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 8px #fff; }
  }

  .calculator {
    background: rgba(15, 15, 40, 0.85);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255, 0, 200, 0.3);
    border-radius: 25px;
    padding: 30px;
    box-shadow:
      0 0 30px rgba(255, 0, 200, 0.4),
      0 0 60px rgba(0, 200, 255, 0.2),
      inset 0 0 30px rgba(0, 200, 255, 0.05);
    position: relative;
    z-index: 10;
    animation: floatIn 0.8s ease-out, glow 4s ease-in-out infinite alternate;
  }

  @keyframes floatIn {
    from {
      opacity: 0;
      transform: translateY(50px) scale(0.9);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes glow {
    from {
      box-shadow:
        0 0 30px rgba(255, 0, 200, 0.4),
        0 0 60px rgba(0, 200, 255, 0.2),
        inset 0 0 30px rgba(0, 200, 255, 0.05);
    }
    to {
      box-shadow:
        0 0 40px rgba(0, 200, 255, 0.5),
        0 0 80px rgba(255, 0, 200, 0.3),
        inset 0 0 40px rgba(255, 0, 200, 0.05);
    }
  }

  .title {
    text-align: center;
    color: #fff;
    font-size: 14px;
    letter-spacing: 6px;
    margin-bottom: 20px;
    text-transform: uppercase;
    text-shadow:
      0 0 5px #ff00c8,
      0 0 10px #ff00c8,
      0 0 20px #ff00c8;
    animation: titleFlicker 3s infinite;
  }

  @keyframes titleFlicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.4; }
    94% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
  }

  .display {
    background: rgba(0, 0, 30, 0.8);
    border: 2px solid rgba(0, 255, 255, 0.4);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    min-height: 120px;
    text-align: right;
    box-shadow:
      inset 0 0 20px rgba(0, 255, 255, 0.2),
      0 0 15px rgba(0, 255, 255, 0.3);
    overflow: hidden;
    position: relative;
  }

  .display::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
    animation: scan 4s infinite;
  }

  @keyframes scan {
    0% { left: -100%; }
    100% { left: 100%; }
  }

  .history {
    color: rgba(0, 255, 255, 0.5);
    font-size: 16px;
    min-height: 24px;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
    word-break: break-all;
  }

  .current {
    color: #00ffff;
    font-size: 40px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    text-shadow:
      0 0 5px #00ffff,
      0 0 15px #00ffff,
      0 0 25px #00ffff;
    word-break: break-all;
    transition: all 0.2s;
  }

  .current.updated {
    animation: pulse 0.3s ease;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); text-shadow: 0 0 5px #fff, 0 0 15px #00ffff, 0 0 25px #00ffff, 0 0 40px #00ffff; }
    100% { transform: scale(1); }
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  button {
    background: rgba(20, 20, 50, 0.8);
    border: 2px solid rgba(0, 255, 255, 0.3);
    border-radius: 12px;
    color: #00ffff;
    font-size: 22px;
    font-weight: bold;
    height: 60px;
    width: 60px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-shadow: 0 0 8px #00ffff;
    box-shadow:
      0 0 8px rgba(0, 255, 255, 0.2),
      inset 0 0 8px rgba(0, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 255, 255, 0.4), transparent);
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s;
  }

  button:hover {
    background: rgba(0, 255, 255, 0.15);
    border-color: #00ffff;
    color: #fff;
    transform: translateY(-3px);
    box-shadow:
      0 0 20px rgba(0, 255, 255, 0.8),
      0 5px 15px rgba(0, 255, 255, 0.4),
      inset 0 0 15px rgba(0, 255, 255, 0.3);
  }

  button:hover::before {
    width: 150%;
    height: 150%;
  }

  button:active {
    transform: translateY(0) scale(0.95);
    box-shadow:
      0 0 30px rgba(0, 255, 255, 1),
      inset 0 0 20px rgba(0, 255, 255, 0.5);
  }

  button.operator {
    color: #ff00c8;
    border-color: rgba(255, 0, 200, 0.4);
    text-shadow: 0 0 8px #ff00c8;
    box-shadow:
      0 0 8px rgba(255, 0, 200, 0.2),
      inset 0 0 8px rgba(255, 0, 200, 0.1);
  }

  button.operator:hover {
    background: rgba(255, 0, 200, 0.15);
    border-color: #ff00c8;
    color: #fff;
    box-shadow:
      0 0 20px rgba(255, 0, 200, 0.8),
      0 5px 15px rgba(255, 0, 200, 0.4),
      inset 0 0 15px rgba(255, 0, 200, 0.3);
  }

  button.operator::before {
    background: radial-gradient(circle, rgba(255, 0, 200, 0.4), transparent);
  }

  button.equals {
    color: #fff;
    background: linear-gradient(135deg, rgba(255, 0, 200, 0.3), rgba(0, 255, 255, 0.3));
    border-color: #fff;
    text-shadow: 0 0 10px #fff;
    box-shadow:
      0 0 15px rgba(255, 255, 255, 0.4),
      inset 0 0 15px rgba(255, 255, 255, 0.1);
  }

  button.equals:hover {
    background: linear-gradient(135deg, rgba(255, 0, 200, 0.6), rgba(0, 255, 255, 0.6));
    box-shadow:
      0 0 30px rgba(255, 255, 255, 0.8),
      0 5px 20px rgba(255, 0, 200, 0.5),
      inset 0 0 20px rgba(255, 255, 255, 0.3);
  }

  button.clear {
    color: #ff3366;
    border-color: rgba(255, 51, 102, 0.4);
    text-shadow: 0 0 8px #ff3366;
    box-shadow:
      0 0 8px rgba(255, 51, 102, 0.2),
      inset 0 0 8px rgba(255, 51, 102, 0.1);
  }

  button.clear:hover {
    background: rgba(255, 51, 102, 0.15);
    border-color: #ff3366;
    color: #fff;
    box-shadow:
      0 0 20px rgba(255, 51, 102, 0.8),
      0 5px 15px rgba(255, 51, 102, 0.4),
      inset 0 0 15px rgba(255, 51, 102, 0.3);
  }

  button.zero {
    grid-column: span 2;
    width: 100%;
  }

  button.pressed {
    animation: btnPress 0.4s ease;
  }

  @keyframes btnPress {
    0% { transform: scale(1); }
    50% { transform: scale(0.92); box-shadow: 0 0 40px currentColor; }
    100% { transform: scale(1); }
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    transform: scale(0);
    animation: rippleEffect 0.6s linear;
    pointer-events: none;
  }

  @keyframes rippleEffect {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  @media (max-width: 400px) {
    .calculator { padding: 20px; }
    button { height: 55px; font-size: 18px; }
    .current { font-size: 32px; }
  }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="calculator">
    <div class="title">◆ NEON CALC ◆</div>
    <div class="display">
      <div class="history" id="history"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="clear" onclick="deleteLast()">⌫</button>
      <button class="operator" onclick="appendOperator('%')">%</button>
      <button class="operator" onclick="appendOperator('/')">÷</button>

      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button class="operator" onclick="appendOperator('*')">×</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button class="operator" onclick="appendOperator('-')">−</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button class="operator" onclick="appendOperator('+')">+</button>

      <button class="zero" onclick="appendNumber('0')">0</button>
      <button onclick="appendDecimal()">.</button>
      <button class="equals" onclick="calculate()">=</button>
    </div>
  </div>

<script>
  // создаем звезды на фоне
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 3) + 's';
    starsContainer.appendChild(star);
  }

  const currentEl = document.getElementById('current');
  const historyEl = document.getElementById('history');

  let current = '0';
  let history = '';
  let lastWasOperator = false;
  let justCalculated = false;

  function updateDisplay() {
    currentEl.textContent = current;
    historyEl.textContent = history;
    currentEl.classList.remove('updated');
    void currentEl.offsetWidth;
    currentEl.classList.add('updated');
  }

  function animateButton(btn) {
    btn.classList.remove('pressed');
    void btn.offsetWidth;
    btn.classList.add('pressed');
  }

  function appendNumber(num) {
    animateButton(event.target);
    if (justCalculated) {
      current = num;
      history = '';
      justCalculated = false;
    } else if (current === '0' || lastWasOperator) {
      if (lastWasOperator) {
        history += current;
      }
      current = num;
    } else {
      if (current.length < 12) current += num;
    }
    lastWasOperator = false;
    updateDisplay();
  }

  function appendDecimal() {
    animateButton(event.target);
    if (justCalculated) {
      current = '0.';
      history = '';
      justCalculated = false;
    } else if (lastWasOperator) {
      history += current;
      current = '0.';
      lastWasOperator = false;
    } else if (!current.includes('.')) {
      current += '.';
    }
    updateDisplay();
  }

  function appendOperator(op) {
    animateButton(event.target);
    const symbol = op === '*' ? '×' : op === '/' ? '÷' : op === '-' ? '−' : op;
    if (lastWasOperator) {
      history = history.slice(0, -3) + ' ' + symbol + ' ';
    } else {
      history += current + ' ' + symbol + ' ';
      lastWasOperator = true;
    }
    justCalculated = false;
    updateDisplay();
  }

  function calculate() {
    animateButton(event.target);
    try {
      let expr = history + (lastWasOperator ? '' : current);
      let evalExpr = expr
        .replace(/×/g, '*')
        .replace(/÷/g, '/')
        .replace(/−/g, '-')
        .replace(/%/g, '/100');
      if (!evalExpr.trim()) return;
      const result = Function('"use strict";return (' + evalExpr + ')')();
      if (!isFinite(result)) {
        current = 'ERROR';
        history = '';
      } else {
        history = expr + ' =';
        current = String(Math.round(result * 1e10) / 1e10);
      }
      justCalculated = true;
      lastWasOperator = false;
      flashScreen();
    } catch (e) {
      current = 'ERROR';
      history = '';
    }
    updateDisplay();
  }

  function clearAll() {
    animateButton(event.target);
    current = '0';
    history = '';
    lastWasOperator = false;
    justCalculated = false;
    updateDisplay();
  }

  function deleteLast() {
    animateButton(event.target);
    if (justCalculated) {
      clearAll();
      return;
    }
    if (current.length > 1) {
      current = current.slice(0, -1);
    } else {
      current = '0';
    }
    updateDisplay();
  }

  function flashScreen() {
    const display = document.querySelector('.display');
    display.animate([
      { boxShadow: 'inset 0 0 20px rgba(0, 255, 255, 0.2), 0 0 15px rgba(0, 255, 255, 0.3)' },
      { boxShadow: 'inset 0 0 40px rgba(255, 0, 200, 0.8), 0 0 60px rgba(255, 0, 200, 0.9)' },
      { boxShadow: 'inset 0 0 20px rgba(0, 255, 255, 0.2), 0 0 15px rgba(0, 255, 255, 0.3)' }
    ], { duration: 600, easing: 'ease-out' });
  }

  // поддержка клавиатуры
  document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (/[0-9]/.test(key)) {
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === key);
      if (btn) { btn.click(); }
    } else if (key === '.') {
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === '.');
      if (btn) btn.click();
    } else if (key === '+') {
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === '+');
      if (btn) btn.click();
    } else if (key === '-') {
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === '−');
      if (btn) btn.click();
    } else if (key === '*') {
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === '×');
      if (btn) btn.click();
    } else if (key === '/') {
      e.preventDefault();
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === '÷');
      if (btn) btn.click();
    } else if (key === '%') {
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === '%');
      if (btn) btn.click();
    } else if (key === 'Enter' || key === '=') {
      e.preventDefault();
      const btn = document.querySelector('.equals');
      if (btn) btn.click();
    } else if (key === 'Backspace') {
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === '⌫');
      if (btn) btn.click();
    } else if (key === 'Escape') {
      const btn = [...document.querySelectorAll('button')].find(b => b.textContent === 'AC');
      if (btn) btn.click();
    }
  });

  // эффект ряби при клике
  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });
</script>
</body>
</html>
