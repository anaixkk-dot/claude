<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Melody Player</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
  }
  h1 { margin-bottom: 0.5em; }
  button {
    padding: 14px 28px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: #ffcc00;
    color: #222;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  button:hover { transform: scale(1.05); }
  #status { margin-top: 1.5em; opacity: 0.85; }
</style>
</head>
<body>
  <h1>🎵 Мелодия</h1>
  <button id="play">▶ Воспроизвести</button>
  <div id="status">Нажмите кнопку или дождитесь автозапуска</div>

<script>
const NOTES = {
  C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23,
  G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25,
  D5: 587.33, E5: 659.25, G5: 783.99
};

// "Ode to Joy" by Beethoven
const MELODY = [
  ['E4', 0.5], ['E4', 0.5], ['F4', 0.5], ['G4', 0.5],
  ['G4', 0.5], ['F4', 0.5], ['E4', 0.5], ['D4', 0.5],
  ['C4', 0.5], ['C4', 0.5], ['D4', 0.5], ['E4', 0.5],
  ['E4', 0.75], ['D4', 0.25], ['D4', 1.0],
  ['E4', 0.5], ['E4', 0.5], ['F4', 0.5], ['G4', 0.5],
  ['G4', 0.5], ['F4', 0.5], ['E4', 0.5], ['D4', 0.5],
  ['C4', 0.5], ['C4', 0.5], ['D4', 0.5], ['E4', 0.5],
  ['D4', 0.75], ['C4', 0.25], ['C4', 1.0]
];

let ctx;

function playMelody() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  let t = ctx.currentTime + 0.1;
  for (const [note, dur] of MELODY) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = NOTES[note];
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.95);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + dur);
    t += dur;
  }
  document.getElementById('status').textContent = '♫ Играет...';
  setTimeout(() => {
    document.getElementById('status').textContent = 'Готово. Нажмите снова, чтобы повторить.';
  }, (t - ctx.currentTime) * 1000);
}

document.getElementById('play').addEventListener('click', playMelody);

// Try to autoplay on load (works if the browser allows it)
window.addEventListener('load', () => {
  try {
    playMelody();
  } catch (e) {
    document.getElementById('status').textContent =
      'Браузер блокирует автозапуск. Нажмите кнопку выше.';
  }
});
</script>
</body>
</html>
